name: wasla
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  cached_network_image: ^3.4.1
  connectivity_plus: ^7.1.0
  cookie_jar: ^4.0.8
  cupertino_icons: ^1.0.8
  dartz: ^0.10.1
  date_picker_timeline: ^1.2.7
  device_preview: ^1.3.1
  dio: ^5.9.0
  dio_cookie_manager: ^3.3.0
  file_picker: ^10.3.3
  firebase_core: ^4.4.0
  firebase_messaging: ^16.1.1
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_file_downloader: ^2.1.1
  flutter_holo_date_picker: ^2.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_local_notifications: ^20.1.0
  flutter_localizations:
    sdk: flutter
  flutter_map: ^8.2.2
  flutter_native_splash: ^2.4.6
  flutter_screenutil: ^5.9.3
  flutter_secure_storage: ^9.2.4
  flutter_slidable: ^4.0.3
  flutter_spinkit: ^5.2.2
  flutter_svg: ^2.2.4
  flutter_vector_icons: ^2.0.0
  fluttertoast: ^9.0.0
  geocoding: ^4.0.0
  get_it: ^8.2.0
  go_router: ^17.1.0
  google_fonts: ^6.3.2
  googleapis_auth: ^2.0.0
  http: ^1.6.0
  http_parser: ^4.1.2
  image_picker: ^1.2.0
  intl: ^0.20.2
  just_audio: ^0.10.5
  latlong2: ^0.9.1
  location: ^8.0.1
  open_filex: ^4.7.0
  path: ^1.9.0
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  pinput: ^5.0.2
  readmore: ^3.0.0
  record: ^6.2.0
  scrollable_positioned_list: ^0.3.8
  shared_preferences: ^2.5.3
  signalr_netcore: ^1.4.4
  skeletonizer: ^2.1.0+1
  syncfusion_flutter_charts: ^31.2.16
  syncfusion_flutter_datepicker: ^31.2.2
  url_launcher: ^6.3.2
  uuid: ^4.5.3
  voice_note_kit: ^1.2.0
dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:

  uses-material-design: true

  assets:
    - assets/images/
    - assets/lang/ar.json
    - assets/lang/en.json
    - assets/audio/
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-VariableFont_slnt,wght.ttf

    - family: Inter
      fonts:
        - asset: assets/fonts/Inter_18pt-Regular.ttf

flutter_assets:
  assets_path: assets/images/
  output_path: lib/core/utils/
  filename: assets.dart
